<div class="page-header">
  <h1>
    <i class="bi bi-building me-2"></i>
    Employer Review
  </h1>
  <p>Review registered employer compliance status</p>
</div>

<div class="text-center py-5" *ngIf="loading">
  <div class="spinner-border text-primary"></div>
</div>

<div class="table-card" *ngIf="!loading">
  <table class="table table-hover mb-0">
    <thead>
      <tr>
        <th>Company</th>
        <th>Industry</th>
        <th>Registered</th>
        <th>Status</th>
        <th>Contact</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let e of employers">
        <td>
          <strong>{{ e.companyName }}</strong>
        </td>
        <td>{{ e.industry }}</td>
        <td>{{ e.registrationDate | date: 'MMM dd, yyyy' }}</td>
        <td>
          <span class="badge-status" [class]="statusBadge(e.status)">
            {{ e.status }}
          </span>
        </td>
        <td>{{ e.contactInfo ?? '—' }}</td>
      </tr>
      <tr *ngIf="!employers.length">
        <td colspan="5" class="text-center text-muted py-5">
          No employers found.
        </td>
      </tr>
    </tbody>
  </table>
</div>
