<div class="page-header"><h1>Create User</h1></div>
<div class="alert alert-danger" *ngIf="error()">{{error()}}</div>
<div class="row"><div class="col-lg-6"><div class="table-card p-4">
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="row g-3">
      <div class="col-12"><label class="form-label">Full Name</label><input formControlName="fullName" class="form-control" required /></div>
      <div class="col-md-6"><label class="form-label">Email</label><input type="email" formControlName="email" class="form-control" required /></div>
      <div class="col-md-6"><label class="form-label">Password</label><input type="password" formControlName="password" class="form-control" required /></div>
      <div class="col-md-6"><label class="form-label">Role</label><select formControlName="role" class="form-select"><option *ngFor="let r of roles" [value]="r">{{r}}</option></select></div>
      <div class="col-md-6"><label class="form-label">Phone</label><input formControlName="phone" class="form-control" /></div>
    </div>
    <div class="d-flex gap-2 mt-4">
      <button type="submit" class="btn btn-accent" [disabled]="loading()"><span class="spinner-border spinner-border-sm me-1" *ngIf="loading()"></span>Create User</button>
      <a routerLink="/admin/manage-users" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div></div></div>
