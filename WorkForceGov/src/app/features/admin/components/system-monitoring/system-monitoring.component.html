<div class="page-header d-flex justify-content-between align-items-center">
  <div><h1><i class="bi bi-activity me-2"></i>System Logs</h1><p>Real-time platform activity log</p></div>
  <span class="badge bg-primary py-2 px-3">{{logs.length}} entries</span>
</div>
<div class="text-center py-5" *ngIf="loading"><div class="spinner-border text-primary"></div></div>
<div class="table-card" *ngIf="!loading"><table class="table table-hover mb-0">
  <thead><tr><th>User</th><th>Action</th><th>Resource</th><th>IP</th><th>Timestamp</th></tr></thead>
  <tbody>
    <tr *ngFor="let l of logs"><td><strong>{{l.user?.fullName ?? 'User #' + l.userId}}</strong></td><td><span class="badge-status" [class]="badgeClass(l.action)">{{l.action}}</span></td><td>{{l.resource ?? '—'}}</td><td>{{l.ipAddress ?? '—'}}</td><td>{{l.timestamp | date:'MMM dd, yyyy HH:mm:ss'}}</td></tr>
    <tr *ngIf="!logs.length"><td colspan="5" class="text-center text-muted py-5">No logs found.</td></tr>
  </tbody>
</table></div>
