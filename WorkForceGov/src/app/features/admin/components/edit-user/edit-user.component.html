<div class="page-header">
  <h1>Edit User</h1>
</div>

<!-- Error Handling -->
<div class="alert alert-danger" *ngIf="error()">
  {{ error() }}
</div>

<div class="row">
  <div class="col-lg-6">
    <div class="table-card p-4">
      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="row g-3">
          
          <!-- Full Name -->
          <div class="col-12">
            <label class="form-label">Full Name</label>
            <input formControlName="fullName" class="form-control" placeholder="Enter full name" />
          </div>

          <!-- Email -->
          <div class="col-md-6">
            <label class="form-label">Email</label>
            <input type="email" formControlName="email" class="form-control" placeholder="name@example.com" />
          </div>

          <!-- Optional Password -->
          <div class="col-md-6">
            <label class="form-label">New Password (optional)</label>
            <input type="password" formControlName="password" class="form-control" placeholder="Leave blank to keep current" />
          </div>

          <!-- Role Selection -->
          <div class="col-md-6">
            <label class="form-label">Role</label>
            <select formControlName="role" class="form-select">
              <option *ngFor="let r of roles" [value]="r">{{ r }}</option>
            </select>
          </div>

          <!-- Status Selection -->
          <div class="col-md-6">
            <label class="form-label">Status</label>
            <select formControlName="status" class="form-select">
              <option *ngFor="let s of statuses" [value]="s">{{ s }}</option>
            </select>
          </div>

        </div>

        <!-- Action Footer -->
        <div class="d-flex gap-2 mt-4">
          <button type="submit" class="btn btn-accent" [disabled]="loading() || form.invalid">
            <span class="spinner-border spinner-border-sm me-1" *ngIf="loading()"></span>
            Save Changes
          </button>
          <a routerLink="/admin/manage-users" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
