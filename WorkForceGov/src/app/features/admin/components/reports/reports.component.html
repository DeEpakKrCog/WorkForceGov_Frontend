<div class="page-header">
  <h1><i class="bi bi-bar-chart me-2"></i>System Reports</h1>
</div>

<!-- Success Notification -->
<div class="alert alert-success alert-dismissible" *ngIf="msg()">
  {{ msg() }}
  <button class="btn-close" (click)="msg.set('')"></button>
</div>

<div class="row g-4">
  <!-- Report Generation Form -->
  <div class="col-lg-4">
    <div class="table-card p-4">
      <h6 class="fw-bold mb-3">
        <i class="bi bi-plus-square me-2"></i>Generate Report
      </h6>
      <form [formGroup]="form" (ngSubmit)="submit()">
        
        <!-- Report Name -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Report Name <span class="text-danger">*</span></label>
          <input 
            formControlName="reportName" 
            class="form-control" 
            placeholder="e.g. Q1 2026 Summary" />
        </div>

        <!-- Report Type -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Data Source <span class="text-danger">*</span></label>
          <select formControlName="reportType" class="form-select">
            <option value="">-- Select Report Type --</option>
            <option *ngFor="let t of types" [value]="t">{{ t }}</option>
          </select>
        </div>

        <!-- Date Filters (Optional) -->
        <div class="row mb-4">
          <div class="col-6">
            <label class="form-label fw-semibold text-muted small">Start Date (Optional)</label>
            <input type="date" formControlName="startDate" class="form-control form-control-sm" />
          </div>
          <div class="col-6">
            <label class="form-label fw-semibold text-muted small">End Date (Optional)</label>
            <input type="date" formControlName="endDate" class="form-control form-control-sm" />
          </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn btn-primary w-100 py-2" [disabled]="form.invalid || loading()">
          <span class="spinner-border spinner-border-sm me-2" *ngIf="loading()"></span>
          <i class="bi bi-gear-fill me-2" *ngIf="!loading()"></i>
          Generate & Archive
        </button>
      </form>
    </div>
  </div>

  <!-- Generated Reports Table -->
  <div class="col-lg-8">
    <div class="table-card">
      <div class="card-header-custom p-3 border-bottom bg-light fw-bold">
        <span>Generated Reports Archive</span>
      </div>
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th>Report Name</th>
            <th>Type</th>
            <th>Generated Date</th>
            <th class="text-end">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let r of reports">
            <td>
              <div class="d-flex align-items-center">
                <i class="bi bi-file-earmark-spreadsheet text-success fs-4 me-2"></i>
                <strong>{{ r.reportName }}</strong>
              </div>
            </td>
            <td>
              <span class="badge bg-secondary">{{ r.reportType }}</span>
            </td>
            <td>
              <small class="text-muted">{{ r.generatedDate | date:'MMM dd, yyyy HH:mm' }}</small>
            </td>
            <td class="text-end">
              <!-- DOWNLOAD BUTTON -->
              <button 
                class="btn btn-sm btn-outline-primary shadow-sm" 
                (click)="download(r)" 
                [disabled]="downloadingId() === r.id">
                <span class="spinner-border spinner-border-sm" *ngIf="downloadingId() === r.id"></span>
                <i class="bi bi-cloud-download" *ngIf="downloadingId() !== r.id"></i> 
                CSV
              </button>
            </td>
          </tr>
          
          <!-- Empty State -->
          <tr *ngIf="!reports.length">
            <td colspan="4" class="text-center text-muted py-5">
              <i class="bi bi-inbox fs-1 d-block mb-2 text-secondary"></i>
              No reports generated yet.
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
