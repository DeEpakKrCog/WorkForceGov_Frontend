<div class="page-header"><h1>Company Profile</h1></div>
<div class="alert alert-success" *ngIf="saved()"><i class="bi bi-check-circle me-2"></i>Profile saved!</div>
<div class="row"><div class="col-lg-7"><div class="table-card p-4">
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="row g-3">
      <div class="col-md-6"><label class="form-label fw-semibold">Company Name</label><input formControlName="companyName" class="form-control" /></div>
      <div class="col-md-6"><label class="form-label fw-semibold">Industry</label><select formControlName="industry" class="form-select"><option value="">-- Select --</option><option *ngFor="let i of industries" [value]="i">{{i}}</option></select></div>
      <div class="col-12"><label class="form-label fw-semibold">Address</label><textarea formControlName="address" class="form-control" rows="2"></textarea></div>
      <div class="col-md-6"><label class="form-label fw-semibold">Contact Info</label><input formControlName="contactInfo" class="form-control" /></div>
    </div>
    <button type="submit" class="btn btn-accent mt-4" [disabled]="loading()"><span class="spinner-border spinner-border-sm me-1" *ngIf="loading()"></span>Save Changes</button>
  </form>
</div></div></div>
