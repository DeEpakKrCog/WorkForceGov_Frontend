<div class="page-header mb-4">
  <h1 class="h3 fw-bold text-dark">Company Profile</h1>
  <p class="text-muted">Manage your business information and contact details.</p>
</div>

<!-- Success Alert -->
<div class="alert alert-success alert-dismissible fade show" *ngIf="saved()">
  <i class="bi bi-check-circle-fill me-2"></i>Profile saved successfully!
  <button type="button" class="btn-close" (click)="saved.set(false)"></button>
</div>

<div class="row">
  <div class="col-lg-8">
    <div class="card shadow-sm border-0 bg-white p-4">
      
      <h5 class="mb-4 pb-2 border-bottom fw-semibold text-secondary">
        <i class="bi bi-building me-2"></i>Business Details
      </h5>

      <!-- The Form -->
      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="row g-4">
          
          <!-- Company Name -->
          <div class="col-md-6">
            <label class="form-label fw-semibold text-muted small text-uppercase">Company Name</label>
            <input formControlName="companyName" class="form-control" placeholder="Enter company name" />
          </div>

          <!-- Industry -->
          <div class="col-md-6">
            <label class="form-label fw-semibold text-muted small text-uppercase">Industry</label>
            <select formControlName="industry" class="form-select">
              <option value="">-- Select Industry --</option>
              <option *ngFor="let i of industries" [value]="i">{{ i }}</option>
            </select>
          </div>

          <!-- Website -->
          <div class="col-md-6">
            <label class="form-label fw-semibold text-muted small text-uppercase">Website</label>
            <div class="input-group">
              <span class="input-group-text bg-light"><i class="bi bi-globe"></i></span>
              <input formControlName="website" class="form-control" placeholder="https://www.company.com" />
            </div>
          </div>

          <!-- Phone Number -->
          <div class="col-md-6">
            <label class="form-label fw-semibold text-muted small text-uppercase">Phone Number</label>
            <div class="input-group">
              <span class="input-group-text bg-light"><i class="bi bi-telephone"></i></span>
              <input formControlName="phoneNumber" class="form-control" placeholder="Enter phone number" />
            </div>
          </div>

          <!-- Address -->
          <div class="col-12">
            <label class="form-label fw-semibold text-muted small text-uppercase">Headquarters Address</label>
            <textarea formControlName="address" class="form-control" rows="2" placeholder="Street, City, State, ZIP"></textarea>
          </div>

          <!-- Description -->
          <div class="col-12">
            <label class="form-label fw-semibold text-muted small text-uppercase">Company Description</label>
            <textarea formControlName="description" class="form-control" rows="3" placeholder="Briefly describe what your company does..."></textarea>
            <div class="form-text">This description will be visible to citizens viewing your job postings.</div>
          </div>

        </div>

        <!-- Action Buttons -->
        <div class="d-flex justify-content-end mt-4 pt-3 border-top">
          <button type="submit" class="btn btn-primary px-4 py-2" [disabled]="loading()">
            <span class="spinner-border spinner-border-sm me-2" *ngIf="loading()"></span>
            <i class="bi bi-save me-2" *ngIf="!loading()"></i>
            {{ loading() ? 'Saving Changes...' : 'Save Profile' }}
          </button>
        </div>
        
      </form>
    </div>
  </div>
</div>
