<div class="page-header"><h1><i class="bi bi-plus-circle me-2"></i>Post New Job</h1></div>
<div class="alert alert-danger" *ngIf="error()">{{error()}}</div>
<div class="row"><div class="col-lg-8"><div class="table-card p-4">
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="row g-3">
      <div class="col-md-6"><label class="form-label fw-semibold">Job Title <span class="text-danger">*</span></label><input formControlName="jobTitle" class="form-control" placeholder="e.g. Software Engineer" required /></div>
      <div class="col-md-6"><label class="form-label fw-semibold">Location <span class="text-danger">*</span></label><input formControlName="location" class="form-control" placeholder="e.g. New York, NY" required /></div>
      <div class="col-12"><label class="form-label fw-semibold">Description <span class="text-danger">*</span></label><textarea formControlName="description" class="form-control" rows="5" placeholder="Describe the role, requirements, and benefits..." required></textarea></div>
      <div class="col-md-4"><label class="form-label fw-semibold">Category</label><select formControlName="jobCategory" class="form-select"><option value="">-- Select --</option><option *ngFor="let c of categories" [value]="c">{{c}}</option></select></div>
      <div class="col-md-4"><label class="form-label fw-semibold">Min Salary ($)</label><input type="number" formControlName="salaryMin" class="form-control" /></div>
      <div class="col-md-4"><label class="form-label fw-semibold">Max Salary ($)</label><input type="number" formControlName="salaryMax" class="form-control" /></div>
      <div class="col-md-4"><label class="form-label fw-semibold">Closing Date</label><input type="date" formControlName="closingDate" class="form-control" /></div>
    </div>
    <div class="d-flex gap-2 mt-4">
      <button type="submit" class="btn btn-accent" [disabled]="loading()"><span class="spinner-border spinner-border-sm me-1" *ngIf="loading()"></span><i class="bi bi-send me-1"></i>Post Job</button>
      <a routerLink="/employer/manage-jobs" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div></div></div>
