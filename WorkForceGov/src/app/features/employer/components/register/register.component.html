<div class="page-header"><h1><i class="bi bi-building-add me-2"></i>Register Your Company</h1></div>
<div class="alert alert-danger" *ngIf="error()">{{error()}}</div>
<div class="row"><div class="col-lg-6"><div class="table-card p-4">
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="row g-3">
      <div class="col-md-6"><label class="form-label fw-semibold">Company Name <span class="text-danger">*</span></label><input formControlName="companyName" class="form-control" required /></div>
      <div class="col-md-6"><label class="form-label fw-semibold">Industry <span class="text-danger">*</span></label><select formControlName="industry" class="form-select" required><option value="">-- Select --</option><option *ngFor="let i of industries" [value]="i">{{i}}</option></select></div>
      <div class="col-12"><label class="form-label fw-semibold">Address</label><textarea formControlName="address" class="form-control" rows="2"></textarea></div>
      <div class="col-md-6"><label class="form-label fw-semibold">Contact Info</label><input formControlName="contactInfo" class="form-control" /></div>
    </div>
    <button type="submit" class="btn btn-accent w-100 mt-4" [disabled]="loading()"><span class="spinner-border spinner-border-sm me-1" *ngIf="loading()"></span>Register & Continue</button>
  </form>
</div></div></div>
