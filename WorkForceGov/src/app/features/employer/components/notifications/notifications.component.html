<div class="page-header d-flex justify-content-between align-items-center mb-4">
  <div>
    <h2 class="h3 mb-1"><i class="bi bi-bell me-2 text-primary"></i>Notifications</h2>
    <p class="text-muted mb-0">Stay updated on your job applications and account status.</p>
  </div>
  <button class="btn btn-sm btn-outline-primary" *ngIf="notifications.length > 0" (click)="loadNotifications()">
    <i class="bi bi-arrow-clockwise me-1"></i> Refresh
  </button>
</div>

<!-- Loading Spinner -->
<div class="text-center py-5" *ngIf="loading">
  <div class="spinner-border text-primary" role="status"></div>
</div>

<!-- Notifications List -->
<div class="card shadow-sm border-0" *ngIf="!loading">
  <div class="list-group list-group-flush">
    
    <div *ngFor="let n of notifications" 
         class="list-group-item list-group-item-action border-start-0 border-end-0 py-3"
         [class.bg-light]="!n.isRead">
      <div class="d-flex align-items-center gap-3">
        
        <!-- Status Icon -->
        <div class="icon-box" [ngClass]="n.isRead ? 'bg-secondary-subtle' : 'bg-primary-subtle'">
          <i class="bi" [ngClass]="n.isRead ? 'bi-envelope-open text-secondary' : 'bi-envelope-fill text-primary'"></i>
        </div>

        <!-- Content -->
        <div class="flex-grow-1">
          <div class="d-flex justify-content-between align-items-start">
            <p class="mb-1 text-dark" [class.fw-bold]="!n.isRead">{{ n.message }}</p>
            <small class="text-muted">{{ n.createdDate | date:'MMM dd, HH:mm' }}</small>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Empty State -->
  <div *ngIf="!notifications.length" class="text-center py-5 card-body">
    <i class="bi bi-bell-slash display-4 text-secondary mb-3 d-block"></i>
    <p class="text-muted">You're all caught up! No new notifications.</p>
  </div>
</div>

<style>
  .icon-box {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
</style>
