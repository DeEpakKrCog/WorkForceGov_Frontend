<div class="page-header">
  <h1>Edit Job Posting</h1>
</div>

<!-- Error Alert -->
<div class="alert alert-danger" *ngIf="error()">
  <i class="bi bi-exclamation-triangle me-2"></i>{{ error() }}
</div>

<div class="row">
  <div class="col-lg-8">
    <div class="table-card p-4">
      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="row g-3">
          
          <!-- Job Title -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">Job Title</label>
            <input formControlName="jobTitle" class="form-control" placeholder="e.g. Senior Developer" required />
          </div>

          <!-- Location -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">Location</label>
            <input formControlName="location" class="form-control" placeholder="e.g. Remote / City" required />
          </div>

          <!-- Description -->
          <div class="col-12">
            <label class="form-label fw-semibold">Description</label>
            <textarea formControlName="description" class="form-control" rows="5" required></textarea>
          </div>

          <!-- Category -->
          <div class="col-md-4">
            <label class="form-label fw-semibold">Category</label>
            <select formControlName="jobCategory" class="form-select">
              <option value="">-- Select --</option>
              <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
            </select>
          </div>

          <!-- Salary Min -->
          <div class="col-md-4">
            <label class="form-label fw-semibold">Min Salary ($)</label>
            <input type="number" formControlName="salaryMin" class="form-control" />
          </div>

          <!-- Salary Max -->
          <div class="col-md-4">
            <label class="form-label fw-semibold">Max Salary ($)</label>
            <input type="number" formControlName="salaryMax" class="form-control" />
          </div>

        </div>

        <!-- Action Buttons -->
        <div class="d-flex gap-2 mt-4">
          <button type="submit" class="btn btn-accent" [disabled]="loading()">
            <span class="spinner-border spinner-border-sm me-1" *ngIf="loading()"></span>
            Save Changes
          </button>
          <a routerLink="/employer/manage-jobs" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
