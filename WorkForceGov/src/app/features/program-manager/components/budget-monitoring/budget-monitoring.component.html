<!-- Page Header -->
<div class="page-header">
  <h1><i class="bi bi-wallet2 me-2"></i>Budget Monitoring</h1>
</div>

<!-- Stats Row -->
<div class="row g-3 mb-4">
  <!-- Total Budget Stat -->
  <div class="col-sm-4">
    <div class="stat-card">
      <div class="stat-icon" style="background: #dcfce7; color: #16a34a;">
        <i class="bi bi-currency-dollar"></i>
      </div>
      <div class="stat-value">${{ totalBudget | number:'1.0-0' }}</div>
      <div class="stat-label">Total Budget</div>
    </div>
  </div>

  <!-- Programs Stat -->
  <div class="col-sm-4">
    <div class="stat-card">
      <div class="stat-icon" style="background: #dbeafe; color: #2563eb;">
        <i class="bi bi-kanban"></i>
      </div>
      <div class="stat-value">{{ programs.length }}</div>
      <div class="stat-label">Programs</div>
    </div>
  </div>
</div>

<!-- Loading State -->
<div class="text-center py-5" *ngIf="loading">
  <div class="spinner-border text-primary"></div>
</div>

<!-- Data Table -->
<div class="table-card" *ngIf="!loading">
  <table class="table table-hover mb-0">
    <thead>
      <tr>
        <th>Program</th>
        <th>Type</th>
        <th>Budget</th>
        <th>Status</th>
        <th>Share</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let p of programs">
        <td><strong>{{ p.programName }}</strong></td>
        <td>{{ p.programType }}</td>
        <td class="fw-bold" style="color: #16a34a;">
          ${{ p.totalBudget | number:'1.0-0' }}
        </td>
        <td>
          <span 
            class="badge-status" 
            [class.bs-success]="p.status === 'Active'" 
            [class.bs-secondary]="p.status !== 'Active'">
            {{ p.status }}
          </span>
        </td>
        <td style="min-width: 120px;">
          <div class="wfg-progress mb-1">
            <div class="wfg-progress-bar" [style.width]="pct(p) + '%'"></div>
          </div>
          <span style="font-size: .72rem; color: #94a3b8;">
            {{ pct(p) }}%
          </span>
        </td>
      </tr>

      <!-- Empty State -->
      <tr *ngIf="!programs.length">
        <td colspan="5" class="text-center text-muted py-4">
          No programs.
        </td>
      </tr>
    </tbody>
  </table>
</div>
