<div class="page-header d-flex justify-content-between align-items-center">
  <div><h1><i class="bi bi-gift me-2"></i>Benefits Management</h1></div>
  <a routerLink="/program-manager/assign-benefit" class="btn btn-accent"><i class="bi bi-person-plus me-1"></i>Assign Benefit</a>
</div>
<div class="alert alert-success alert-dismissible" *ngIf="msg">{{msg}}<button class="btn-close" (click)="msg=''"></button></div>
<div class="text-center py-5" *ngIf="loading"><div class="spinner-border text-primary"></div></div>
<div class="table-card" *ngIf="!loading"><table class="table table-hover mb-0"><thead><tr><th>Citizen</th><th>Program</th><th>Type</th><th>Amount</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>
<tbody>
  <tr *ngFor="let b of benefits">
    <td><strong>{{b.citizen?.fullName ?? '—'}}</strong></td><td>{{b.program?.programName ?? '—'}}</td><td>{{b.benefitType}}</td>
    <td class="fw-bold" style="color:#16a34a;">${{b.amount | number:'1.2-2'}}</td>
    <td>{{b.benefitDate | date:'MMM dd, yyyy'}}</td>
    <td><span class="badge-status" [class]="statusBadge(b.status)">{{b.status}}</span></td>
    <td *ngIf="b.status==='Pending'" class="d-flex gap-2">
      <button class="btn btn-sm btn-success" (click)="approve(b.id)"><i class="bi bi-check-lg"></i></button>
      <button class="btn btn-sm btn-outline-danger" (click)="reject(b.id)"><i class="bi bi-x-lg"></i></button>
    </td>
    <td *ngIf="b.status!=='Pending'"><span class="text-muted">—</span></td>
  </tr>
  <tr *ngIf="!benefits.length"><td colspan="7" class="text-center text-muted py-5"><i class="bi bi-gift fs-1 d-block mb-2"></i>No benefit records.</td></tr>
</tbody></table></div>
