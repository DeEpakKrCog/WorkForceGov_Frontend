<div class="page-header"><h1><i class="bi bi-bar-chart me-2"></i>Program Reports</h1></div>
<div class="alert alert-success alert-dismissible" *ngIf="msg()">{{msg()}}<button class="btn-close" (click)="msg.set('')"></button></div>
<div class="row g-4">
  <div class="col-lg-4"><div class="table-card p-4">
    <h6 class="fw-bold mb-3"><i class="bi bi-plus-square me-2"></i>Generate Report</h6>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="mb-3"><label class="form-label fw-semibold">Report Name</label><input formControlName="reportName" class="form-control" placeholder="e.g. Q1 2026 Summary" required /></div>
      <div class="mb-3"><label class="form-label fw-semibold">Type</label><select formControlName="reportType" class="form-select"><option value="">-- Select --</option><option *ngFor="let t of types" [value]="t">{{t}}</option></select></div>
      <button type="submit" class="btn btn-accent w-100" [disabled]="loading()"><span class="spinner-border spinner-border-sm me-1" *ngIf="loading()"></span><i class="bi bi-play-circle me-1"></i>Generate</button>
    </form>
  </div></div>
  <div class="col-lg-8"><div class="table-card">
    <div class="card-header-custom"><span>Generated Reports</span></div>
    <table class="table table-hover mb-0"><thead><tr><th>Name</th><th>Type</th><th>Generated</th></tr></thead>
    <tbody>
      <tr *ngFor="let r of reports"><td><strong>{{r.reportName}}</strong></td><td><span class="badge-status bs-info">{{r.reportType}}</span></td><td>{{r.generatedDate | date:'MMM dd, yyyy HH:mm'}}</td></tr>
      <tr *ngIf="!reports.length"><td colspan="3" class="text-center text-muted py-5">No reports yet.</td></tr>
    </tbody></table>
  </div></div>
</div>
