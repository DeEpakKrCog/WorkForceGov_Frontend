<div class="page-header">
  <h1>Create New Training</h1>
</div>

<div class="alert alert-danger" *ngIf="error()">
  {{ error() }}
</div>

<div class="row">
  <div class="col-lg-7">
    <div class="table-card p-4">
      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="row g-3">
          
          <!-- Program Selection -->
          <div class="col-12">
            <label class="form-label fw-semibold">Program *</label>
            <select formControlName="programId" class="form-select" required>
              <option value="">-- Select Program --</option>
              <option *ngFor="let p of programs" [value]="p.id">
                {{ p.programName }}
              </option>
            </select>
          </div>
          
          <!-- Training Title -->
          <div class="col-12">
            <label class="form-label fw-semibold">Training Title *</label>
            <input formControlName="title" class="form-control" required />
          </div>
          
          <!-- Description -->
          <div class="col-12">
            <label class="form-label fw-semibold">Description</label>
            <textarea formControlName="description" class="form-control" rows="3"></textarea>
          </div>
          
          <!-- Start Date -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">Start Date *</label>
            <input type="date" formControlName="startDate" class="form-control" required />
          </div>
          
          <!-- End Date -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">End Date *</label>
            <input type="date" formControlName="endDate" class="form-control" required />
          </div>
          
        </div>
        
        <!-- Action Buttons -->
        <div class="d-flex gap-2 mt-4">
          <button type="submit" class="btn btn-accent" [disabled]="loading()">
            <span class="spinner-border spinner-border-sm me-1" *ngIf="loading()"></span>
            Create Training
          </button>
          <a routerLink="/program-manager/training-management" class="btn btn-outline-secondary">
            Cancel
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
