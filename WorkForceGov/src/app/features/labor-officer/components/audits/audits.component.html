<div class="page-header"><h1>Audit Records</h1></div>
<div class="text-center py-5" *ngIf="loading"><div class="spinner-border text-primary"></div></div>
<div class="table-card" *ngIf="!loading"><table class="table table-hover mb-0"><thead><tr><th>Scope</th><th>Findings</th><th>Date</th><th>Status</th></tr></thead>
<tbody>
  <tr *ngFor="let a of audits"><td><strong>{{a.scope}}</strong></td><td style="font-size:.82rem;color:#64748b;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{a.findings ?? '—'}}</td><td>{{a.date | date:'MMM dd, yyyy'}}</td><td><span class="badge-status" [class]="statusBadge(a.status)">{{a.status}}</span></td></tr>
  <tr *ngIf="!audits.length"><td colspan="4" class="text-center text-muted py-5">No audits found.</td></tr>
</tbody></table></div>
