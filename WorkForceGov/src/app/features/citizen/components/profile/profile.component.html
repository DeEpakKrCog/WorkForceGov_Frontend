<div class="page-header">
  <h1>My Profile</h1>
  <p>Manage your personal information</p>
</div>

<!-- Success Feedback -->
<div class="alert alert-success" *ngIf="saved()">
  <i class="bi bi-check-circle me-2"></i>Profile updated successfully!
</div>

<div class="row">
  <!-- Profile Edit Form -->
  <div class="col-lg-7">
    <div class="table-card p-4">
      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label fw-semibold">Full Name</label>
            <input formControlName="fullName" class="form-control" />
          </div>

          <div class="col-md-6">
            <label class="form-label fw-semibold">Date of Birth</label>
            <input type="date" formControlName="dob" class="form-control" />
          </div>

          <div class="col-md-6">
            <label class="form-label fw-semibold">Gender</label>
            <select formControlName="gender" class="form-select">
              <option value="">Select</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Other</option>
              <option value="PreferNotToSay">Prefer not to say</option>
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label fw-semibold">Phone Number</label>
            <input formControlName="phoneNumber" class="form-control" />
          </div>

          <div class="col-12">
            <label class="form-label fw-semibold">Address</label>
            <textarea formControlName="address" class="form-control" rows="3"></textarea>
          </div>
        </div>

        <button 
          type="submit" 
          class="btn btn-accent mt-4" 
          [disabled]="loading()"
        >
          <span class="spinner-border spinner-border-sm me-1" *ngIf="loading()"></span>
          Save Changes
        </button>
      </form>
    </div>
  </div>

  <!-- Account Sidebar -->
  <div class="col-lg-5">
    <div class="table-card p-4">
      <h6 class="fw-bold mb-3">
        <i class="bi bi-person-circle me-2"></i>Account Info
      </h6>
      
      <div class="mb-2" style="font-size: .875rem; color: #64748b;">
        Name: <strong>{{ auth.fullName() }}</strong>
      </div>
      
      <div class="mb-3" style="font-size: .875rem; color: #64748b;">
        Role: <strong>{{ auth.roleLabel() }}</strong>
      </div>
      
      <hr />
      
      <p style="font-size: .82rem; color: #94a3b8; line-height: 1.5;">
        To change your email or password, please contact the system administrator.
      </p>
    </div>
  </div>
</div>
