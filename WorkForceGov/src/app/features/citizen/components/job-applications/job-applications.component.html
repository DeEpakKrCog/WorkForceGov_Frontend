<div class="page-header">
  <h1>My Applications</h1>
  <p>Track the status of all your job applications</p>
</div>

<!-- Notification Alert -->
<div class="alert alert-info alert-dismissible" *ngIf="msg">
  {{ msg }}
  <button class="btn-close" (click)="msg=''"></button>
</div>

<!-- Loading State -->
<div class="text-center py-5" *ngIf="loading">
  <div class="spinner-border text-primary"></div>
</div>

<!-- Applications Table -->
<div class="table-card" *ngIf="!loading">
  <table class="table table-hover mb-0">
    <thead>
      <tr>
        <th>Job Title</th>
        <th>Company</th>
        <th>Applied On</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let a of apps">
        <td>
          <strong>{{ a.jobOpening?.jobTitle }}</strong>
        </td>
        <td>{{ a.jobOpening?.employer?.companyName }}</td>
        <td>{{ a.submittedDate | date:'MMM dd, yyyy' }}</td>
        <td>
          <span class="badge-status" [class]="statusBadge(a.status)">
            {{ a.status }}
          </span>
        </td>
        <td>
          <button 
            *ngIf="a.status === 'Pending'" 
            class="btn btn-sm btn-outline-danger" 
            style="border-radius: 8px; font-size: .75rem;" 
            (click)="withdraw(a.id)"
          >
            Withdraw
          </button>
        </td>
      </tr>

      <!-- Empty State -->
      <tr *ngIf="!apps.length">
        <td colspan="5" class="text-center text-muted py-5">
          <i class="bi bi-inbox fs-1 d-block mb-2"></i>
          No applications yet.
        </td>
      </tr>
    </tbody>
  </table>
</div>
